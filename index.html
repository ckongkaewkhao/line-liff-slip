<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายจ่ายหน้างาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col justify-between">

    <div class="p-4 max-w-md mx-auto w-full">
        <div class="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl p-5 shadow-sm text-white mb-6">
            <h1 class="text-xl font-bold">บันทึกรายจ่าย</h1>
            <p class="text-xs text-emerald-100 mt-1">กรุณาเลือกประเภทการบันทึกข้อมูล</p>
        </div>

        <div class="flex bg-slate-200 p-1 rounded-xl mb-4">
            <button id="btnModeSlip" type="button" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-emerald-600 transition-all">
                ✅ บิลมีสลิป
            </button>
            <button id="btnModeNoSlip" type="button" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all">
                ❌ บิลไม่มีสลิป
            </button>
        </div>

        <form id="slipForm" class="bg-white rounded-2xl p-5 shadow-sm space-y-4 border border-slate-100">
            
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">วันที่ทำรายการ <span class="text-red-500">*</span></label>
                <input type="date" id="dateInput" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">ผู้ส่งข้อมูล (LINE Name)</label>
                <input type="text" id="empName" readonly required placeholder="กำลังดึงชื่อจาก LINE..." class="w-full bg-slate-100 text-slate-400 font-medium p-3 rounded-xl border border-slate-200 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">หมวดหมู่ / โครงการ <span class="text-red-500">*</span></label>
                <select id="projectSite" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none">
                    <option value="">-- กรุณาเลือกรายการ --</option>
                    <option value="เงินเดือน">เงินเดือน</option>
                    <option value="ซ่อมรถ">ซ่อมรถ</option>
                    <option value="น้ำมันรถ">น้ำมันรถ</option>
                    <option value="ค่าใช้จ่ายส่วนตัว">ค่าใช้จ่ายส่วนตัว</option>
                    <option value="ค่างานล่วงหน้า">ค่างานล่วงหน้า</option>
                    <option value="แพล้นปูน">แพล้นปูน</option>
                    <option value="สวนทุเรียน">สวนทุเรียน</option>
                    <option value="เบิกล่วงหน้า">เบิกล่วงหน้า</option>
                    <option value="อื่นๆ">อื่นๆ (พิมพ์ระบุหน้างานเอง)</option>
                    <option disabled>──────────</option>
                    <option value="งานเขื่อนปรางหมู่">งานเขื่อนปรางหมู่</option>
                    <option value="งานวางท่อท่าแค">งานวางท่อท่าแค</option>
                    <option value="งานถนนสายประชาสงเคราะห์">งานถนนสายประชาสงเคราะห์</option>
                    <option value="งานถนนสายสมหวัง 3 สาย">งานถนนสายสมหวัง 3 สาย</option>
                    <option value="งานถนนสายยางยายขลุย">งานถนนสายยางยายขลุย</option>
                    <option value="งานถนนสายทอนน้ำ">งานถนนสายทอนน้ำ</option>
                    <option value="งานเขื่อนตำนาน">งานเขื่อนตำนาน</option>
                    <option value="งานประปาปาล์มพัฒนา">งานประปาปาล์มพัฒนา</option>
                    <option value="งานขุดลอกปรางหมู่">งานขุดลอกปรางหมู่</option>
                    <option value="งานถนนสายบ้านพรุ">งานถนนสายบ้านพรุ</option>
                    <option value="งานประปาสมหวัง">งานประปาสมหวัง</option>
                    <option value="งานสะพานสายโคกม่วง">งานสะพานสายโคกม่วง</option>
                    <option value="งานท่อเหลี่ยมพนมวังก์">งานปรับปรุงสร้างระบายน้ำบ้านใหม่</option>
                    <option value="งานเขื่อนท่าโพธิ์">งานเขื่อนท่าโพธิ์</option>
                    <option value="งานถนนสายท่าแค">งานถนนสายท่าแค</option>
                    <option value="งานถนนสายปัญญาวุธ">งานถนนสายปัญญาวุธ</option>
                    <option value="งานถนนสายต้นโหนด">งานถนนสายต้นโหนด</option>
                    <option value="งานถนนสายน้ำใต้บ่อ">งานถนนสายน้ำใต้บ่อ</option>
                    <option value="งานถนนท่าสำเภา">งานถนนท่าสำเภา</option>
                </select>
            </div>

            <div id="otherProjectDiv" class="hidden">
                <label class="block text-sm font-semibold text-slate-600 mb-1">ระบุชื่อโครงการ / หน้างานใหม่ <span class="text-red-500">*</span></label>
                <input type="text" id="otherProjectSite" placeholder="พิมพ์ชื่อโครงการใหม่ที่นี่" class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
            </div>

            <div id="boqZone">
                <label class="block text-sm font-semibold text-slate-600 mb-1">ประเภท BOQ (ถ้ามี)</label>
                
                <input type="text" id="boqType_slip" placeholder="เช่น ค่าวัสดุ, ค่าแรง..." class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
                
                <select id="boqType_noslip" class="hidden w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all mb-2">
                    <option value="">-- เลือกประเภท BOQ --</option>
                    <option value="ค่าใช้จ่ายรถ">ค่าใช้จ่ายรถ</option>
                    <option value="ค่าแรงจริง">ค่าแรงจริง</option>
                    <option value="อื่นๆ">อื่นๆ (พิมพ์ระบุเอง)</option>
                </select>
                <input type="text" id="boqType_noslip_other" placeholder="ระบุประเภท BOQ..." class="hidden w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">รายละเอียดสิ่งของ <span class="text-red-500">*</span></label>
                <input type="text" id="itemDetail" placeholder="เช่น ค่าปูน 5 ถุง" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">จำนวนเงิน (บาท) <span class="text-red-500">*</span></label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">หมายเหตุ (เพิ่มเติม)</label>
                <textarea id="remark" rows="2" placeholder="ระบุหมายเหตุเพิ่มเติม (ถ้ามี)" class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all"></textarea>
            </div>

            <div id="imageUploadZone">
                <label class="block text-sm font-semibold text-slate-600 mb-1">แนบรูปภาพสลิป / หน้างาน <span class="text-red-500">*</span></label>
                <input type="file" id="slipFiles" accept="image/*" multiple required class="w-full bg-white p-2 rounded-xl border border-slate-200 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all transform active:scale-[0.98] mt-2">
                ส่งข้อมูลเข้าระบบ
            </button>
        </form>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfKLRezPJbcpnOMJ0PcUcJTgJ83anK6DgylXzSVtKG7c95zwDWMipFPwpQcB3--EnOfA/exec"; 
        const LIFF_ID = "2010350342-kxcHYs3F"; 

        let currentMode = "มีสลิป"; // เก็บสถานะโหมดปัจจุบัน

        // ตั้งค่าวันที่ปัจจุบัน
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;

        // 🔹 ระบบสลับโหมด
        const btnSlip = document.getElementById('btnModeSlip');
        const btnNoSlip = document.getElementById('btnModeNoSlip');
        const imgZone = document.getElementById('imageUploadZone');
        const slipFileInput = document.getElementById('slipFiles');
        
        const boqSlip = document.getElementById('boqType_slip');
        const boqNoSlip = document.getElementById('boqType_noslip');
        const boqNoSlipOther = document.getElementById('boqType_noslip_other');

        btnSlip.addEventListener('click', () => {
            currentMode = "มีสลิป";
            btnSlip.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-emerald-600 transition-all";
            btnNoSlip.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all";
            
            imgZone.classList.remove('hidden');
            slipFileInput.setAttribute('required', 'required'); // บังคับแนบรูป

            boqSlip.classList.remove('hidden');
            boqNoSlip.classList.add('hidden');
            boqNoSlipOther.classList.add('hidden');
        });

        btnNoSlip.addEventListener('click', () => {
            currentMode = "ไม่มีสลิป";
            btnNoSlip.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-red-500 transition-all";
            btnSlip.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all";
            
            imgZone.classList.add('hidden');
            slipFileInput.removeAttribute('required'); // ไม่บังคับแนบรูป
            slipFileInput.value = ""; // ล้างรูปที่เลือกไว้ทิ้ง

            boqSlip.classList.add('hidden');
            boqNoSlip.classList.remove('hidden');
            // เช็คว่าเคยเลือก "อื่นๆ" ไว้ไหม ถ้าใช่ให้เปิดช่องพิมพ์
            if(boqNoSlip.value === "อื่นๆ") {
                boqNoSlipOther.classList.remove('hidden');
            }
        });

        // เปิดช่องระบุ BOQ เอง
        boqNoSlip.addEventListener('change', function() {
            if (this.value === 'อื่นๆ') {
                boqNoSlipOther.classList.remove('hidden');
            } else {
                boqNoSlipOther.classList.add('hidden');
                boqNoSlipOther.value = "";
            }
        });

        // เปิดช่องระบุโครงการเอง
        document.getElementById('projectSite').addEventListener('change', function() {
            const otherDiv = document.getElementById('otherProjectDiv');
            const otherInput = document.getElementById('otherProjectSite');
            if (this.value === 'อื่นๆ') {
                otherDiv.classList.remove('hidden');
                otherInput.setAttribute('required', 'required');
            } else {
                otherDiv.classList.add('hidden');
                otherInput.removeAttribute('required');
                otherInput.value = '';
            }
        });

        function enableManualInput() {
            const empInput = document.getElementById('empName');
            empInput.removeAttribute('readonly');
            empInput.classList.remove('bg-slate-100', 'text-slate-400');
            empInput.classList.add('bg-white', 'text-slate-800', 'focus:border-emerald-500');
            empInput.placeholder = "พิมพ์ชื่อของคุณที่นี่";
        }

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    if (profile && profile.displayName) {
                        document.getElementById('empName').value = profile.displayName;
                    } else { enableManualInput(); }
                }
            } catch (err) { 
                console.error(err); 
                enableManualInput(); 
            }
        }
        initLiff();

        const resizeAndBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64String = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
                    resolve(base64String);
                };
            };
            reader.onerror = error => reject(error);
        });

        document.getElementById('slipForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "กำลังบันทึกข้อมูล...";
            btnSubmit.disabled = true;
            btnSubmit.classList.replace('bg-emerald-500', 'bg-slate-400');

            try {
                // จัดการรูปภาพ (ถ้ามีสลิป)
                const files = document.getElementById('slipFiles').files;
                const imagesPayload = [];
                if (currentMode === "มีสลิป") {
                    for (let i = 0; i < files.length; i++) {
                        const compressedBase64 = await resizeAndBase64(files[i]);
                        imagesPayload.push({
                            name: `${Date.now()}_${i}_slip.jpg`,
                            data: compressedBase64
                        });
                    }
                }

                // จัดการชื่อโครงการ
                let finalProjectSite = document.getElementById('projectSite').value;
                if (finalProjectSite === 'อื่นๆ') {
                    finalProjectSite = document.getElementById('otherProjectSite').value;
                }

                // จัดการค่า BOQ ตามโหมด
                let finalBoqType = "";
                if (currentMode === "มีสลิป") {
                    finalBoqType = document.getElementById('boqType_slip').value;
                } else {
                    finalBoqType = document.getElementById('boqType_noslip').value;
                    if (finalBoqType === "อื่นๆ") {
                        finalBoqType = document.getElementById('boqType_noslip_other').value;
                    }
                }

                const payload = {
                    dateInput: document.getElementById('dateInput').value,
                    employeeName: document.getElementById('empName').value,
                    projectSite: finalProjectSite,
                    boqType: finalBoqType,
                    itemDetail: document.getElementById('itemDetail').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    remark: document.getElementById('remark').value,
                    images: imagesPayload,
                    slipType: currentMode // 🔹 ส่งค่า มีสลิป/ไม่มีสลิป ไปให้หลังบ้าน
                };

                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.success) {
                    alert('🎉 สำเร็จเรียบร้อย! ส่งข้อมูลเข้าระบบแล้ว');
                    liff.closeWindow(); 
                } else {
                    alert('❌ เกิดข้อผิดพลาดจากระบบหลังบ้าน: ' + result.error);
                }
            } catch (error) {
                alert('❌ ไม่สามารถเชื่อมต่อระบบได้');
                console.error(error);
            } finally {
                btnSubmit.innerText = "ส่งข้อมูลเข้าระบบ";
                btnSubmit.disabled = false;
                btnSubmit.classList.replace('bg-slate-400', 'bg-emerald-500');
            }
        });
    </script>
</body>
</html>
