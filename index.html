<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายจ่ายหน้างาน (เวอร์ชันทดสอบ)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col justify-between">

    <div class="p-4 max-w-md mx-auto w-full">
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-5 shadow-sm text-white mb-6">
            <h1 class="text-xl font-bold">บันทึกรายจ่าย (ข้อความเพียวๆ)</h1>
            <p class="text-xs text-blue-100 mt-1">เวอร์ชันทดสอบระบบเชื่อมต่อ Google Sheet</p>
        </div>

        <form id="slipForm" class="bg-white rounded-2xl p-5 shadow-sm space-y-4 border border-slate-100">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">ผู้ส่งข้อมูล (LINE Name) <span class="text-red-500">*</span></label>
                <input type="text" id="empName" readonly required placeholder="กำลังดึงชื่อ..." class="w-full bg-slate-100 text-slate-500 font-medium p-3 rounded-xl border border-slate-200 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">เลือกหน้างาน / โครงการ <span class="text-red-500">*</span></label>
                <select id="projectSite" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none">
                    <option value="">-- กรุณาเลือกหน้างาน --</option>
                    <option value="หน้างาน A (พระราม 9)">หน้างาน A (พระราม 9)</option>
                    <option value="หน้างาน B (บางนา)">หน้างาน B (บางนา)</option>
                    <option value="หน้างาน C (ราชพฤกษ์)">หน้างาน C (ราชพฤกษ์)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">รายการสิ่งของ / รายละเอียด <span class="text-red-500">*</span></label>
                <input type="text" id="itemDetail" placeholder="เช่น ค่าปูน, ค่าน้ำมัน" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">จำนวนเงินรวม (บาท) <span class="text-red-500">*</span></label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" required class="w-full bg-white p-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none">
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all mt-2">
                ส่งข้อมูลเข้า Google Sheet
            </button>
        </form>
    </div>

    <script>
        // ใช้ลิงก์ล่าสุดของคุณ
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxItlUVFcdyP1opj7pqH3BRAbc6hDOTz-1uo5CCjiyo2o-42GryBxZ1rUZGy2LybhfWKA/exec"; 
        const LIFF_ID = "2010350342-kxcHYs3F"; 

        function enableManualInput() {
            const empInput = document.getElementById('empName');
            empInput.removeAttribute('readonly');
            empInput.classList.remove('bg-slate-100', 'text-slate-500');
            empInput.classList.add('bg-white', 'text-slate-800', 'focus:border-blue-500');
            empInput.placeholder = "พิมพ์ชื่อของคุณที่นี่";
        }

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    if (profile && profile.displayName) {
                        document.getElementById('empName').value = profile.displayName;
                    } else { enableManualInput(); }
                }
            } catch (err) { 
                console.error(err); 
                enableManualInput(); 
            }
        }
        initLiff();

        document.getElementById('slipForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "กำลังส่งข้อมูล...";
            btnSubmit.disabled = true;

            try {
                const payload = {
                    employeeName: document.getElementById('empName').value,
                    projectSite: document.getElementById('projectSite').value,
                    itemDetail: document.getElementById('itemDetail').value,
                    amount: parseFloat(document.getElementById('amount').value)
                };

                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.success) {
                    alert('🎉 ข้อมูลเด้งเข้า Google Sheet เรียบร้อยแล้ว!');
                    liff.closeWindow(); 
                } else {
                    alert('❌ เกิดข้อผิดพลาด: ' + result.error);
                }
            } catch (error) {
                alert('❌ เชื่อมต่อหลังบ้านไม่ได้');
                console.error(error);
            } finally {
                btnSubmit.innerText = "ส่งข้อมูลเข้า Google Sheet";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
