    <script>
        const SPREADSHEET_ID = '1xLc-lNK7KVQSBeKbom7j8LfMhSu6PwPchM5y5exGpbw';
        const SHEET_NAME = 'รายการโอนเงิน'; 
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${new Date().getTime()}`;

        let rawData = [];
        let currentFilteredData = [];
        let summaryTableInstance = null;
        let detailedTableInstance = null;
        let chartInstance = null;
        let dateSortAsc = true;
        const googleColors = ['#0071e3', '#34c759', '#FF9500', '#ff3b30', '#af52de', '#5ac8fa', '#ffcc00', '#00c7be', '#8e8e93', '#1d1d1f'];

        $(document).ready(function() {
            Chart.register(ChartDataLabels);
            fetchGoogleSheetData();

            const fpOptions = { dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y", locale: "th", disableMobile: "true", onChange: applyGlobalFilters };
            flatpickr("#filterStartDate", fpOptions);
            flatpickr("#filterEndDate", fpOptions);

            $('#filterProject').on('change', applyGlobalFilters);
            $('#resetFilters').on('click', function() {
                document.querySelector('#filterStartDate')._flatpickr.clear();
                document.querySelector('#filterEndDate')._flatpickr.clear();
                $('#filterProject').val('');
                applyGlobalFilters();
            });
            $('#toggleDateSort').on('click', function() {
                dateSortAsc = !dateSortAsc;
                $('#sortIcon').text(dateSortAsc ? '↑' : '↓');
                $('#sortLabel').text(dateSortAsc ? 'วันที่: เก่า → ใหม่' : 'วันที่: ใหม่ → เก่า');
                applyGlobalFilters();
            });
        });

        function fetchGoogleSheetData() {
            $('#kpiTotal').text('กำลังโหลด...');
            $('#kpiProjects, #kpiTransactions').text('-');
            
            Papa.parse(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}&_cb=${new Date().getTime()}`, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) { 
                    if (!results.data || results.data.length === 0) return;
                    processData(results.data); 
                },
                error: function(err) { alert("เกิดข้อผิดพลาดในการดึงข้อมูล โปรดตรวจสอบอินเทอร์เน็ต"); }
            });
        }

        function processData(data) {
            if (data.length < 2) return;
            const col = { date: 1, project: 4, details: 6, amount: 7, note: 8 };
            
            let headerRow = 1; 
            for (let r = 0; r < Math.min(10, data.length); r++) {
                let text = data[r].join('').replace(/\s/g, '');
                if (text.includes('วันที่') && text.includes('จำนวนเงิน')) { headerRow = r; break; }
            }

            rawData = [];
            for (let i = headerRow + 1; i < data.length; i++) {
                let row = data[i];
                if (!row) continue;
                
                let aVal = String(row[col.amount] || '').trim();
                if (aVal === '') continue; 

                let cleanAmount = parseFloat(aVal.replace(/,/g, ''));
                if (isNaN(cleanAmount)) continue; 

                let dVal = String(row[col.date] || '').trim();
                let pVal = String(row[col.project] || '').trim() || 'ไม่ระบุโครงการ';
                let detVal = String(row[col.details] || '').trim();
                let noteVal = String(row[col.note] || '').trim();
                
                let parsedDate = new Date();
                if (dVal.includes('/')) {
                    let parts = dVal.split('/');
                    if (parts.length >= 3) {
                        let year = parseInt(parts[2]);
                        if (year < 100) year += 2000;
                        parsedDate = new Date(year, parseInt(parts[1]) - 1, parseInt(parts[0]));
                        dVal = `${String(parts[0]).padStart(2, '0')}/${String(parts[1]).padStart(2, '0')}/${year}`;
                    }
                }

                rawData.push({ id: i, dateText: dVal !== '' ? dVal : '-', dateObj: parsedDate, project: pVal, details: detVal, amount: cleanAmount, note: noteVal });
            }

            const uniqueProjects = [...new Set(rawData.map(item => item.project))].sort();
            const projectFilter = document.getElementById('filterProject');
            const currentSelected = projectFilter.value; 
            
            projectFilter.innerHTML = '<option value="">-- แสดงทั้งหมด --</option>'; 
            uniqueProjects.forEach(proj => projectFilter.appendChild(new Option(proj, proj)));
            projectFilter.value = currentSelected;

            applyGlobalFilters();
        }

        function applyGlobalFilters() {
            const startDateVal = $('#filterStartDate').val();
            const endDateVal = $('#filterEndDate').val();
            const projectVal = $('#filterProject').val();

            let filteredData = rawData.filter(item => {
                let isMatch = true;
                if (projectVal && item.project !== projectVal) isMatch = false;
                if (item.dateObj) {
                    if (startDateVal) { let sDate = new Date(startDateVal); sDate.setHours(0,0,0,0); if (item.dateObj < sDate) isMatch = false; }
                    if (endDateVal) { let eDate = new Date(endDateVal); eDate.setHours(23,59,59,999); if (item.dateObj > eDate) isMatch = false; }
                }
                return isMatch;
            });

            filteredData.sort((a, b) => {
                let diff = a.dateObj - b.dateObj;
                return dateSortAsc ? diff : -diff;
            });

            currentFilteredData = filteredData;

            updateDashboards(filteredData);
        }

        function updateDashboards(data) {
            const totalAmount = data.reduce((sum, item) => sum + item.amount, 0);
            
            $('#kpiTotal').text(totalAmount.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
            $('#kpiProjects').text([...new Set(data.map(item => item.project))].length.toLocaleString('th-TH'));
            $('#kpiTransactions').text(data.length.toLocaleString('th-TH'));

            const projectStats = {};
            data.forEach(item => {
                if(!projectStats[item.project]) projectStats[item.project] = { sum: 0, count: 0 };
                projectStats[item.project].sum += item.amount;
                projectStats[item.project].count += 1;
            });
            const projectArray = Object.keys(projectStats).map(proj => ({ name: proj, sum: projectStats[proj].sum, count: projectStats[proj].count })).sort((a, b) => b.sum - a.sum);

            let chartLabels = projectArray.map(p => p.name);
            let chartData = projectArray.map(p => p.sum);

            if (projectArray.length > 10 && !$('#filterProject').val()) {
                const top = projectArray.slice(0, 9);
                chartLabels = top.map(p => p.name); chartLabels.push('อื่นๆ');
                chartData = top.map(p => p.sum); chartData.push(projectArray.slice(9).reduce((acc, curr) => acc + curr.sum, 0));
            }

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('expenseChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: chartLabels, datasets: [{ data: chartData, backgroundColor: googleColors, borderWidth: 0, hoverOffset: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '70%',
                    plugins: {
                        legend: { position: 'right', labels: { font: { family: '-apple-system, sans-serif', size: 10 }, usePointStyle: true, boxWidth: 6, color: '#1d1d1f' } },
                        datalabels: { color: '#ffffff', formatter: (value) => { if(totalAmount === 0) return ""; let pct = ((value*100) / totalAmount); return pct > 4 ? pct.toFixed(1) + "%" : ""; }, font: { family: '-apple-system', size: 9, weight: '600' }, textShadowColor: 'rgba(0,0,0,0.2)', textShadowBlur: 4 },
                        tooltip: { backgroundColor: 'rgba(29,29,31,0.9)', padding: 12, cornerRadius: 8, callbacks: { label: (c) => ` ${c.raw.toLocaleString('th-TH', {minimumFractionDigits: 2})} บาท` } }
                    }
                }
            });

            if (summaryTableInstance) {
                summaryTableInstance.clear();
                projectArray.forEach(p => summaryTableInstance.row.add([p.name, p.count.toLocaleString('th-TH'), p.sum.toLocaleString('th-TH', { minimumFractionDigits: 2 })]));
                summaryTableInstance.draw();
            } else {
                let tbody = '';
                projectArray.forEach(p => tbody += `<tr><td class="font-medium text-[13px]">${p.name}</td><td class="text-right text-[#86868b] text-[13px]">${p.count.toLocaleString('th-TH')}</td><td class="text-right font-medium text-[13px]">${p.sum.toLocaleString('th-TH', { minimumFractionDigits: 2 })}</td></tr>`);
                $('#summaryTable tbody').html(tbody);
                summaryTableInstance = $('#summaryTable').DataTable({ paging: false, info: false, searching: false, order: [[2, 'desc']], language: { emptyTable: "ไม่มีข้อมูล" }, columnDefs: [ { className: "dt-right", targets: [1, 2] } ] });
            }

            if (detailedTableInstance) {
                detailedTableInstance.clear();
                data.forEach(item => {
                    let sortKey = item.dateObj ? item.dateObj.getFullYear().toString() + String(item.dateObj.getMonth() + 1).padStart(2, '0') + String(item.dateObj.getDate()).padStart(2, '0') : "00000000";
                    let dateHtml = `<span style="display:none;">${sortKey}</span>${item.dateText}`;
                    detailedTableInstance.row.add([ dateHtml, item.project, item.details, item.amount.toLocaleString('th-TH', { minimumFractionDigits: 2 }), item.note ]);
                });
                detailedTableInstance.draw();
            } else {
                detailedTableInstance = $('#detailedTable').DataTable({
                    pageLength: 20, 
                    lengthMenu: [10, 20, 50, 100, 500, 5000], 
                    order: [[0, 'asc']], 
                    stripeClasses: [],
                    language: { search: "", searchPlaceholder: "ค้นหารายละเอียด...", lengthMenu: "แสดง _MENU_ แถว", info: "แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ", paginate: { previous: "ก่อนหน้า", next: "ถัดไป" }, emptyTable: "ไม่มีข้อมูล" },
                    dom: '<"flex flex-col md:flex-row justify-between items-center mb-4 gap-4 no-print"lf>rt<"flex flex-col md:flex-row justify-between items-center mt-4 gap-4 text-sm text-[#86868b] no-print"ip>',
                    columnDefs: [ { className: "dt-right", targets: [3] }, { className: "web-only-col", targets: [1] } ],
                    stateSave: false, 
                    ordering: false   
                });

                detailedTableInstance.clear();
                data.forEach(item => {
                    let sortKey = item.dateObj ? item.dateObj.getFullYear().toString() + String(item.dateObj.getMonth() + 1).padStart(2, '0') + String(item.dateObj.getDate()).padStart(2, '0') : "00000000";
                    let dateHtml = `<span style="display:none;">${sortKey}</span><span class="text-[#86868b]">${item.dateText}</span>`;
                    detailedTableInstance.row.add([ dateHtml, item.project, item.details, item.amount.toLocaleString('th-TH', { minimumFractionDigits: 2 }), item.note ]);
                });
                detailedTableInstance.draw();

                $('.dataTables_filter input').addClass('g-input w-full sm:w-64').css('border-radius', '20px').css('padding', '6px 16px');
                $('.dataTables_length select').addClass('g-input ml-2').css('border-radius', '10px').css('padding', '4px 8px');
            }
        }

        function exportFormalReport() {
            if (!detailedTableInstance) return;

            const projVal = $('#filterProject').val();
            const totalText = $('#kpiTotal').text();

            $('#printProjectName').text(projVal ? projVal : 'ทุกโครงการ (รวมทั้งหมด)');
            $('#printTotalAmount').text(totalText);

            const currentLen = detailedTableInstance.page.len();
            detailedTableInstance.page.len(-1).draw(false); 

            setTimeout(() => {
                window.print();
                detailedTableInstance.page.len(currentLen).draw(false); 
            }, 800); 
        }

        function exportToExcel() {
            if (!currentFilteredData || currentFilteredData.length === 0) {
                alert("ไม่มีข้อมูลสำหรับดาวน์โหลด");
                return;
            }

            const excelData = currentFilteredData.map(item => ({
                "วันที่": item.dateText,
                "โครงการ": item.project,
                "รายละเอียด": item.details,
                "จำนวนเงิน": item.amount,
                "หมายเหตุ": item.note
            }));

            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Report");

            const projVal = $('#filterProject').val();
            let fileName = "SAENSABAI_Report";
            if (projVal) {
                fileName += `_${projVal.replace(/\s+/g, '-')}`;
            }
            fileName += ".xlsx";

            XLSX.writeFile(workbook, fileName);
        }
    </script>
</body>
</html>
